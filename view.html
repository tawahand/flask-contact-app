<!DOCTYPE html>
<html>
  <head>
    <title>View Data</title>
    <style>
      table {
        width: 60%;
        margin: auto;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 10px;
        border: 1px solid #333;
      }
      th {
        background: #eee;
      }
      h1 {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Saved Contacts</h1>

    <table>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
      </tr>

      {% for row in data %}
      <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
