<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flask + Database Demo</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        padding: 20px;
      }
      .box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 500px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h1 {
        text-align: center;
      }
      label {
        display: block;
        margin-top: 10px;
      }
      input[type="text"],
      input[type="email"] {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
      }
      button {
        margin-top: 15px;
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .msg {
        margin-top: 15px;
        color: green;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Save Data to Database</h1>

      <form method="POST" action="/">
        <label>Your Name:</label>
        <input type="text" name="name" required />

        <label>Your Email:</label>
        <input type="email" name="email" required />

        <button type="submit">Save</button>
      </form>

      {% if msg %}
      <p class="msg">{{ msg }}</p>
      {% endif %}
    </div>
  </body>
</html>
